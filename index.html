<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferreteria Sistema Pro</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--verde:#1a3a2a;--verde-mid:#2d5a3d;--verde-light:#3d7a52;--amarillo:#f5c518;--bg:#f4f1eb;--card:#fff;--text:#1a1a1a;--text-muted:#6b6b5e;--border:#ddd8cc;--red:#c0392b;--red-bg:#fdf0ee;--orange:#e67e22;--orange-bg:#fef5ec;font-family:'Barlow',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);min-height:100vh}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--verde)}
.login-box{background:var(--card);border-radius:12px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--verde);text-align:center;margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:var(--text-muted);margin-bottom:2rem}
.login-box label{font-size:12px;font-weight:500;color:var(--text-muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.login-box input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-family:'Barlow',sans-serif;outline:none;margin-bottom:16px;transition:border .15s}
.login-box input:focus{border-color:var(--verde-light)}
.login-btn{width:100%;padding:11px;background:var(--verde);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Barlow',sans-serif;transition:background .15s}
.login-btn:hover{background:var(--verde-mid)}
.login-error{background:var(--red-bg);color:var(--red);border:1px solid #f09090;border-radius:6px;padding:8px 12px;font-size:13px;margin-bottom:12px;display:none}

/* APP */
.app{display:none}
.header{background:var(--verde);color:#fff;padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:56px;margin-bottom:1.5rem}
.header-logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:1px;color:var(--amarillo)}
.header-sub{font-size:13px;color:rgba(255,255,255,.6);margin-left:auto;display:flex;align-items:center;gap:10px}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.15);color:#fff}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4caf50}
.sync-dot.syncing{background:var(--amarillo);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif;display:flex;align-items:center;gap:5px}
.logout-btn:hover{background:rgba(255,255,255,.25)}
.nav{display:flex;gap:6px;padding:0 1.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.nav-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:6px;border:1.5px solid var(--border);background:var(--card);color:var(--text-muted);cursor:pointer;font-size:13px;font-family:'Barlow',sans-serif;font-weight:500;transition:all .15s}
.nav-btn:hover{border-color:var(--verde-light);color:var(--verde)}
.nav-btn.active{background:var(--verde);color:#fff;border-color:var(--verde)}
.content{padding:0 1.5rem 2rem}
.screen{display:none}.screen.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:1.5rem}
.metric{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:1rem;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--verde-light)}
.metric-label{font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.metric-value{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--verde)}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--verde);margin-bottom:1rem;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.5px}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;margin-bottom:1.5rem}
.prod-card{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:1rem;transition:all .15s}
.prod-card:hover{border-color:var(--verde-light);transform:translateY(-2px)}
.prod-icon{width:40px;height:40px;background:var(--verde);border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.prod-icon i{font-size:20px;color:var(--amarillo)}
.prod-name{font-weight:500;font-size:14px;color:var(--text);margin-bottom:4px;line-height:1.3}
.prod-cat{font-size:11px;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
.prod-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.prod-price{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--verde)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-ok{background:#e8f5e9;color:#1a6b35}
.badge-low{background:var(--orange-bg);color:#a05000}
.badge-out{background:var(--red-bg);color:var(--red)}
.alert-bar{background:var(--orange-bg);border:1.5px solid #f0c070;border-radius:8px;padding:10px 14px;font-size:13px;color:#7a4500;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:6px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--verde);color:#fff}.btn-primary:hover{background:var(--verde-mid)}
.btn-yellow{background:var(--amarillo);color:var(--verde)}
.btn-export{background:#1a6b35;color:#fff;border:none}.btn-export:hover{background:#155a2c}
.btn-edit{background:#e8f5e9;color:#1a6b35;border:1px solid #97c459;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif}
.btn-del{background:var(--red-bg);color:var(--red);border:1px solid #f09090;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif}
.prod-actions{display:flex;gap:6px;margin-top:8px}
.venta-layout{display:grid;grid-template-columns:1fr 340px;gap:1.5rem;align-items:start}
.card{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:1.25rem}
label{font-size:12px;font-weight:500;color:var(--text-muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
input,select{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-family:'Barlow',sans-serif;background:var(--card);color:var(--text);outline:none;transition:border .15s}
input:focus,select:focus{border-color:var(--verde-light)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.form-group{margin-bottom:12px}
.search-bar{position:relative;margin-bottom:1rem}
.search-bar input{padding-left:36px}
.search-bar i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:16px}
.sell-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;max-height:420px;overflow-y:auto;padding-right:4px}
.sell-card{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .15s;position:relative;user-select:none}
.sell-card:hover{border-color:var(--verde-light);transform:translateY(-1px)}
.sell-card.selected{border-color:var(--amarillo);background:#fffde7}
.sell-card.out{opacity:.5;cursor:not-allowed}
.sell-card-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.3}
.sell-card-price{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--verde)}
.sell-card-stock{font-size:11px;color:var(--text-muted);margin-top:2px}
.sell-card-icon{width:32px;height:32px;background:var(--verde);border-radius:5px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.sell-card-icon i{font-size:16px;color:var(--amarillo)}
.selected-badge{position:absolute;top:6px;right:6px;width:18px;height:18px;background:var(--amarillo);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--verde)}
.sell-card.selected .selected-badge{display:flex}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.cart-item:last-child{border-bottom:none}
.cart-total{display:flex;justify-content:space-between;padding:12px 0 4px;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--verde)}
.qty-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.qty-btn{width:26px;height:26px;border-radius:5px;border:1.5px solid var(--border);background:var(--card);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.qty-btn:hover{background:var(--verde);color:#fff;border-color:var(--verde)}
.qty-input{width:44px;text-align:center;padding:3px;font-size:13px;border:1.5px solid var(--border);border-radius:5px}
.empty{text-align:center;padding:1.5rem;color:var(--text-muted);font-size:13px}
.no-results{text-align:center;padding:2rem;color:var(--text-muted);font-size:13px;grid-column:1/-1}
.cat-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cat-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text-muted);cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif;transition:all .15s}
.cat-btn.active{background:var(--verde);color:#fff;border-color:var(--verde)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;font-size:11px;color:var(--text-muted);border-bottom:2px solid var(--border);font-weight:500;text-transform:uppercase;letter-spacing:.3px}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9f8f4}
.export-bar{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.export-bar label{margin-bottom:0;white-space:nowrap}
.export-bar select{width:auto}
.toast{position:fixed;bottom:20px;right:20px;background:var(--verde);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;display:none;align-items:center;gap:8px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.show{display:flex}
.toast.error{background:var(--red)}

/* MODAL EDITAR */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:10px;padding:1.5rem;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--verde);margin-bottom:1.25rem;text-transform:uppercase}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}

@media(max-width:700px){.venta-layout{grid-template-columns:1fr}.prod-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo"><i class="ti ti-tools"></i> FERRETERIA</div>
    <div class="login-sub">Sistema Pro — Acceso restringido</div>
    <div class="login-error" id="login-error">Usuario o contraseña incorrectos</div>
    <div><label>Usuario</label><input type="text" id="login-user" placeholder="usuario"></div>
    <div><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()"><i class="ti ti-login"></i> Ingresar</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
<div class="header">
  <i class="ti ti-tools" style="font-size:22px;color:var(--amarillo)"></i>
  <span class="header-logo">FERRETERIA</span>
  <span style="font-size:13px;color:rgba(255,255,255,.5);margin-left:4px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px">SISTEMA PRO</span>
  <span class="header-sub">
    <span id="fecha-hora"></span>
    <span class="sync-badge"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">Conectando...</span></span>
    <button class="logout-btn" onclick="doLogout()"><i class="ti ti-logout"></i> Salir</button>
  </span>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showScreen('inventario')"><i class="ti ti-package"></i> Inventario</button>
  <button class="nav-btn" onclick="showScreen('venta')"><i class="ti ti-shopping-cart"></i> Nueva venta</button>
  <button class="nav-btn" onclick="showScreen('ventas')"><i class="ti ti-chart-bar"></i> Ventas</button>
  <button class="nav-btn" onclick="showScreen('agregar')"><i class="ti ti-plus"></i> Agregar producto</button>
</div>

<div class="content">

<div id="inventario" class="screen active">
  <div class="metrics" id="metrics"></div>
  <div id="stock-alert" style="display:none" class="alert-bar"></div>
  <div class="section-title"><i class="ti ti-layout-grid"></i> Productos</div>
  <div class="prod-grid" id="prod-grid"><div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--text-muted)">Cargando...</div></div>
</div>

<div id="venta" class="screen">
  <div class="venta-layout">
    <div>
      <div class="section-title"><i class="ti ti-search"></i> Seleccionar productos</div>
      <div class="card">
        <div class="search-bar"><i class="ti ti-search"></i><input type="text" id="search-prod" placeholder="Buscar producto..." oninput="filtrarProductos()"></div>
        <div class="cat-filters" id="cat-filters"></div>
        <div class="sell-grid" id="sell-grid"></div>
      </div>
    </div>
    <div>
      <div class="section-title"><i class="ti ti-receipt"></i> Carrito</div>
      <div class="card">
        <div id="cart-items"></div>
        <div class="cart-total"><span>Total</span><span id="cart-total">S/. 0.00</span></div>
        <button class="btn btn-primary" style="width:100%;margin-top:12px;justify-content:center" onclick="confirmarVenta()"><i class="ti ti-check"></i> Confirmar venta</button>
      </div>
    </div>
  </div>
</div>

<div id="ventas" class="screen">
  <div class="metrics" id="sales-metrics"></div>
  <div class="export-bar">
    <label>Período:</label>
    <select id="export-periodo">
      <option value="hoy">Hoy</option>
      <option value="semana">Esta semana</option>
      <option value="mes">Este mes</option>
      <option value="todo">Todo el historial</option>
    </select>
    <button class="btn btn-export" onclick="exportarExcel()"><i class="ti ti-file-spreadsheet"></i> Exportar Excel</button>
  </div>
  <div class="section-title"><i class="ti ti-list"></i> Registro de ventas</div>
  <div class="card">
    <table><thead><tr><th>Fecha</th><th>Hora</th><th>Producto</th><th>Cant.</th><th>Total</th></tr></thead>
    <tbody id="sales-tbody"></tbody></table>
  </div>
</div>

<div id="agregar" class="screen">
  <div class="section-title"><i class="ti ti-package"></i> Nuevo producto</div>
  <div class="card" style="max-width:520px">
    <div class="form-row">
      <div><label>Nombre</label><input type="text" id="np-nombre" placeholder="Ej: Martillo"></div>
      <div><label>Categoría</label>
        <select id="np-cat"><option>Herramientas</option><option>Materiales</option><option>Electricidad</option><option>Plomería</option><option>Pintura</option><option>Fijaciones</option><option>Seguridad</option><option>Otros</option></select>
      </div>
    </div>
    <div class="form-row three">
      <div><label>Stock inicial</label><input type="number" id="np-stock" min="0" value="0"></div>
      <div><label>Stock mínimo</label><input type="number" id="np-min" min="0" value="5"></div>
      <div><label>Precio (S/.)</label><input type="number" id="np-precio" min="0" step="0.01" value="0"></div>
    </div>
    <button class="btn btn-primary" onclick="agregarProducto()"><i class="ti ti-check"></i> Guardar producto</button>
  </div>
</div>

</div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="modal-editar">
  <div class="modal">
    <div class="modal-title"><i class="ti ti-edit"></i> Editar producto</div>
    <input type="hidden" id="edit-id">
    <div class="form-row">
      <div><label>Nombre</label><input type="text" id="edit-nombre"></div>
      <div><label>Categoría</label>
        <select id="edit-cat"><option>Herramientas</option><option>Materiales</option><option>Electricidad</option><option>Plomería</option><option>Pintura</option><option>Fijaciones</option><option>Seguridad</option><option>Otros</option></select>
      </div>
    </div>
    <div class="form-row three">
      <div><label>Stock</label><input type="number" id="edit-stock" min="0"></div>
      <div><label>Stock mínimo</label><input type="number" id="edit-min" min="0"></div>
      <div><label>Precio (S/.)</label><input type="number" id="edit-precio" step="0.01"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" style="background:var(--border);color:var(--text)" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEdicion()"><i class="ti ti-check"></i> Guardar cambios</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const SUPABASE_URL='https://xcdnvlzuentszrllnixn.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjZG52bHp1ZW50c3pybGxuaXhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NTYyMDgsImV4cCI6MjA5NTIzMjIwOH0.7wrzIAVzYZl02hHiTC9oe669370UQU4AcPEW77hZ_4c';
// Credenciales de acceso — cámbialas por las del cliente
const USUARIOS={'admin':'ferreteria2024','dueno':'mitienda123'};
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const catIcons={Herramientas:'ti-hammer',Materiales:'ti-bricks',Electricidad:'ti-bolt','Plomería':'ti-droplet',Pintura:'ti-paint',Fijaciones:'ti-nail',Seguridad:'ti-shield',Otros:'ti-box'};
let productos=[],ventas=[],carrito=[],catActiva='Todos';

// ── LOGIN ────────────────────────────────────────────────
function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  if(USUARIOS[u]&&USUARIOS[u]===p){
    sessionStorage.setItem('auth','ok');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    iniciarApp();
  } else {
    document.getElementById('login-error').style.display='block';
    document.getElementById('login-pass').value='';
  }
}
function doLogout(){
  sessionStorage.removeItem('auth');
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
}
// Verificar sesión al cargar
window.onload=function(){
  if(sessionStorage.getItem('auth')==='ok'){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    iniciarApp();
  }
};

// ── UTILS ────────────────────────────────────────────────
function showToast(msg,ok=true){
  const t=document.getElementById('toast');
  t.className='toast'+(ok?'':' error')+' show';
  t.innerHTML='<i class="ti '+(ok?'ti-check':'ti-alert-triangle')+'"></i> '+msg;
  setTimeout(()=>t.classList.remove('show'),3000);
}
function setSyncing(val,msg){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  if(val){dot.classList.add('syncing');txt.textContent=msg||'Guardando...';}
  else{dot.classList.remove('syncing');txt.textContent='Conectado';}
}
function getIcon(cat){return catIcons[cat]||'ti-box'}
function getBadge(p){
  if(p.stock===0)return'<span class="badge badge-out">Sin stock</span>';
  if(p.stock<=p.stock_minimo)return'<span class="badge badge-low">Stock bajo</span>';
  return'<span class="badge badge-ok">Disponible</span>';
}
function getStockColor(p){
  if(p.stock===0)return'color:var(--red)';
  if(p.stock<=p.stock_minimo)return'color:var(--orange)';
  return'color:#1a6b35';
}

// ── SUPABASE ─────────────────────────────────────────────
async function cargarProductos(){
  setSyncing(true,'Cargando...');
  const{data,error}=await sb.from('productos').select('*').order('nombre');
  setSyncing(false);
  if(error){showToast('Error cargando productos',false);return;}
  productos=data||[];
  renderInventario();
}
async function cargarVentas(){
  const hoy=getFechaLocal();
  const{data}=await sb.from('ventas').select('*').eq('fecha',hoy).order('id',{ascending:false});
  ventas=data||[];
  renderVentas();
}
function getFechaLocal(){
  return new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'});
}

// ── INVENTARIO ───────────────────────────────────────────
function renderInventario(){
  const ok=productos.filter(p=>p.stock>p.stock_minimo).length;
  const low=productos.filter(p=>p.stock>0&&p.stock<=p.stock_minimo).length;
  const out=productos.filter(p=>p.stock===0).length;
  document.getElementById('metrics').innerHTML=
    '<div class="metric"><div class="metric-label">Total productos</div><div class="metric-value">'+productos.length+'</div></div>'+
    '<div class="metric"><div class="metric-label">Disponibles</div><div class="metric-value">'+ok+'</div></div>'+
    '<div class="metric"><div class="metric-label">Stock bajo</div><div class="metric-value" style="color:var(--orange)">'+low+'</div></div>'+
    '<div class="metric"><div class="metric-label">Sin stock</div><div class="metric-value" style="color:var(--red)">'+out+'</div></div>';
  const alertas=productos.filter(p=>p.stock<=p.stock_minimo);
  const ad=document.getElementById('stock-alert');
  if(alertas.length>0){ad.style.display='flex';ad.innerHTML='<i class="ti ti-alert-triangle"></i> Stock bajo: <strong>'+alertas.map(p=>p.nombre).join(', ')+'</strong>';}
  else ad.style.display='none';
  if(productos.length===0){
    document.getElementById('prod-grid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted)"><i class="ti ti-package" style="font-size:40px;display:block;margin-bottom:10px"></i>No hay productos. Agrega el primero.</div>';
    return;
  }
  document.getElementById('prod-grid').innerHTML=productos.map(p=>
    '<div class="prod-card">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
    '<div class="prod-icon"><i class="ti '+getIcon(p.categoria)+'"></i></div>'+getBadge(p)+'</div>'+
    '<div class="prod-name">'+p.nombre+'</div>'+
    '<div class="prod-cat">'+p.categoria+'</div>'+
    '<div class="prod-footer"><span class="prod-price">S/. '+Number(p.precio).toFixed(2)+'</span>'+
    '<span style="font-size:12px;font-weight:500;'+getStockColor(p)+'">'+p.stock+' uds</span></div>'+
    '<div class="prod-actions">'+
    '<button class="btn-edit" onclick="abrirEditar('+p.id+')"><i class="ti ti-edit"></i> Editar</button>'+
    '<button class="btn-del" onclick="eliminarProducto('+p.id+')"><i class="ti ti-trash"></i></button>'+
    '</div></div>').join('');
}

// ── EDITAR PRODUCTO ──────────────────────────────────────
function abrirEditar(id){
  const p=productos.find(x=>x.id===id);
  if(!p)return;
  document.getElementById('edit-id').value=p.id;
  document.getElementById('edit-nombre').value=p.nombre;
  document.getElementById('edit-cat').value=p.categoria;
  document.getElementById('edit-stock').value=p.stock;
  document.getElementById('edit-min').value=p.stock_minimo;
  document.getElementById('edit-precio').value=p.precio;
  document.getElementById('modal-editar').classList.add('show');
}
function cerrarModal(){document.getElementById('modal-editar').classList.remove('show');}
async function guardarEdicion(){
  const id=parseInt(document.getElementById('edit-id').value);
  const nombre=document.getElementById('edit-nombre').value.trim();
  const categoria=document.getElementById('edit-cat').value;
  const stock=parseInt(document.getElementById('edit-stock').value)||0;
  const stock_minimo=parseInt(document.getElementById('edit-min').value)||0;
  const precio=parseFloat(document.getElementById('edit-precio').value)||0;
  if(!nombre||precio<=0){alert('Completa todos los campos');return;}
  setSyncing(true,'Guardando...');
  const{error}=await sb.from('productos').update({nombre,categoria,stock,stock_minimo,precio}).eq('id',id);
  setSyncing(false);
  if(error){showToast('Error al guardar',false);return;}
  cerrarModal();
  showToast('Producto actualizado ✓');
  await cargarProductos();
}

// ── VENTA ────────────────────────────────────────────────
function renderCatFilters(){
  const cats=['Todos',...new Set(productos.map(p=>p.categoria))];
  document.getElementById('cat-filters').innerHTML=cats.map(c=>
    '<button class="cat-btn'+(c===catActiva?' active':'')+'" onclick="setCat(\''+c+'\')">'+c+'</button>').join('');
}
function setCat(cat){catActiva=cat;renderCatFilters();filtrarProductos();}
function filtrarProductos(){
  const q=(document.getElementById('search-prod').value||'').toLowerCase();
  const filtered=productos.filter(p=>{
    const matchCat=catActiva==='Todos'||p.categoria===catActiva;
    const matchQ=p.nombre.toLowerCase().includes(q)||p.categoria.toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  const enCarrito=new Set(carrito.map(c=>c.id));
  if(filtered.length===0){
    document.getElementById('sell-grid').innerHTML='<div class="no-results"><i class="ti ti-search" style="font-size:24px;display:block;margin-bottom:6px"></i>No se encontraron productos</div>';
    return;
  }
  document.getElementById('sell-grid').innerHTML=filtered.map(p=>
    '<div class="sell-card'+(p.stock===0?' out':'')+(enCarrito.has(p.id)?' selected':'')+'" onclick="'+(p.stock>0?'toggleProd('+p.id+')':'')+'">' +
    '<div class="selected-badge"><i class="ti ti-check"></i></div>'+
    '<div class="sell-card-icon"><i class="ti '+getIcon(p.categoria)+'"></i></div>'+
    '<div class="sell-card-name">'+p.nombre+'</div>'+
    '<div class="sell-card-price">S/. '+Number(p.precio).toFixed(2)+'</div>'+
    '<div class="sell-card-stock">'+(p.stock===0?'Sin stock':p.stock+' disponibles')+'</div></div>').join('');
}
function toggleProd(id){
  const p=productos.find(x=>x.id===id);
  if(!p||p.stock===0)return;
  const ex=carrito.find(c=>c.id===id);
  if(ex){carrito=carrito.filter(c=>c.id!==id);}
  else{carrito.push({id,nombre:p.nombre,qty:1,precio:p.precio});}
  filtrarProductos();renderCarrito();
}
function changeQty(id,delta){
  const item=carrito.find(c=>c.id===id);
  const p=productos.find(x=>x.id===id);
  if(!item||!p)return;
  item.qty=Math.max(1,Math.min(p.stock,item.qty+delta));
  renderCarrito();
}
function setQty(id,val){
  const item=carrito.find(c=>c.id===id);
  const p=productos.find(x=>x.id===id);
  if(!item||!p)return;
  item.qty=Math.max(1,Math.min(p.stock,parseInt(val)||1));
  renderCarrito();
}
function removeFromCart(id){carrito=carrito.filter(c=>c.id!==id);filtrarProductos();renderCarrito();}
function renderCarrito(){
  const c=document.getElementById('cart-items');
  if(carrito.length===0){
    c.innerHTML='<div class="empty"><i class="ti ti-shopping-cart" style="font-size:24px;display:block;margin-bottom:6px"></i>Selecciona productos</div>';
    document.getElementById('cart-total').textContent='S/. 0.00';return;
  }
  c.innerHTML=carrito.map(x=>
    '<div class="cart-item"><div>'+
    '<div style="font-weight:500;font-size:13px">'+x.nombre+'</div>'+
    '<div class="qty-row">'+
    '<button class="qty-btn" onclick="changeQty('+x.id+',-1)">−</button>'+
    '<input class="qty-input" type="number" value="'+x.qty+'" min="1" onchange="setQty('+x.id+',this.value)">'+
    '<button class="qty-btn" onclick="changeQty('+x.id+',1)">+</button>'+
    '</div></div>'+
    '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">'+
    '<strong style="color:var(--verde);font-family:\'Barlow Condensed\',sans-serif;font-size:17px">S/. '+(x.precio*x.qty).toFixed(2)+'</strong>'+
    '<button class="btn-del" onclick="removeFromCart('+x.id+')" style="padding:3px 8px"><i class="ti ti-x"></i></button>'+
    '</div></div>').join('');
  document.getElementById('cart-total').textContent='S/. '+carrito.reduce((a,x)=>a+x.precio*x.qty,0).toFixed(2);
}
async function confirmarVenta(){
  if(carrito.length===0){alert('Selecciona productos primero');return;}
  setSyncing(true,'Registrando...');
  const fecha=getFechaLocal();
  const hora=new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
  for(const c of carrito){
    await sb.from('ventas').insert({fecha,hora,producto:c.nombre,cantidad:c.qty,total:parseFloat((c.precio*c.qty).toFixed(2))});
    const p=productos.find(x=>x.id===c.id);
    if(p){
      await sb.from('productos').update({stock:p.stock-c.qty}).eq('id',c.id);
      p.stock-=c.qty;
    }
  }
  setSyncing(false);
  showToast('Venta registrada ✓');
  carrito=[];renderCarrito();renderInventario();
  await cargarVentas();showScreen('ventas');
}

// ── VENTAS & EXPORTAR ────────────────────────────────────
function renderVentas(){
  const totalDia=ventas.reduce((a,v)=>a+Number(v.total),0);
  const totalUnd=ventas.reduce((a,v)=>a+Number(v.cantidad),0);
  document.getElementById('sales-metrics').innerHTML=
    '<div class="metric"><div class="metric-label">Ventas hoy</div><div class="metric-value">'+ventas.length+'</div></div>'+
    '<div class="metric"><div class="metric-label">Unidades</div><div class="metric-value">'+totalUnd+'</div></div>'+
    '<div class="metric"><div class="metric-label">Total hoy</div><div class="metric-value">S/. '+totalDia.toFixed(2)+'</div></div>';
  const t=document.getElementById('sales-tbody');
  if(ventas.length===0){t.innerHTML='<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted)">No hay ventas hoy</td></tr>';return;}
  t.innerHTML=ventas.map(v=>
    '<tr><td>'+v.fecha+'</td><td>'+v.hora+'</td><td>'+v.producto+'</td><td>'+v.cantidad+'</td>'+
    '<td><strong style="color:var(--verde)">S/. '+Number(v.total).toFixed(2)+'</strong></td></tr>').join('');
}

async function exportarExcel(){
  const periodo=document.getElementById('export-periodo').value;
  setSyncing(true,'Exportando...');
  let query=sb.from('ventas').select('*').order('id',{ascending:false});
  const ahora=new Date();
  if(periodo==='hoy'){
    query=query.eq('fecha',getFechaLocal());
  } else if(periodo==='semana'){
    const dias=[];
    for(let i=0;i<7;i++){
      const d=new Date(ahora);d.setDate(ahora.getDate()-i);
      dias.push(d.toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'}));
    }
    query=query.in('fecha',dias);
  } else if(periodo==='mes'){
    const mes=ahora.toLocaleDateString('es-PE',{month:'2-digit',year:'numeric'});
    // Filtramos en el cliente
  }
  const{data}=await query;

    filtrado=filtrado.filter(v=>v.fecha&&v.fecha.endsWith(mes));
  }

  const wb=XLSX.utils.book_new();

  })));
  XLSX.utils.book_append_sheet(wb,wsV,'Ventas');
  const wsI=XLSX.utils.json_to_sheet(productos.map(p=>({
    Nombre:p.nombre,Categoria:p.categoria,Stock:p.stock,'Stock Minimo':p.stock_minimo,'Precio S/.':p.precio
  })));
  XLSX.utils.book_append_sheet(wb,wsI,'Inventario');
  const label={hoy:'Hoy',semana:'Semana',mes:'Mes',todo:'Historial'};
  XLSX.writeFile(wb,'Ferreteria_'+label[periodo]+'_'+getFechaLocal().replace(/\//g,'-')+'.xlsx');
  showToast('Excel descargado ✓');
}

// ── AGREGAR PRODUCTO ─────────────────────────────────────
async function agregarProducto(){
  const nombre=document.getElementById('np-nombre').value.trim();
  const categoria=document.getElementById('np-cat').value;
  const stock=parseInt(document.getElementById('np-stock').value)||0;
  const stock_minimo=parseInt(document.getElementById('np-min').value)||5;
  const precio=parseFloat(document.getElementById('np-precio').value)||0;
  if(!nombre){alert('Ingresa el nombre');return;}
  if(precio<=0){alert('Ingresa un precio válido');return;}
  setSyncing(true,'Guardando...');
  const{error}=await sb.from('productos').insert({nombre,categoria,stock,stock_minimo,precio});
  setSyncing(false);
  if(error){showToast('Error: '+error.message,false);return;}
  document.getElementById('np-nombre').value='';
  document.getElementById('np-stock').value='0';
  document.getElementById('np-precio').value='0';
  showToast('Producto guardado ✓');
  await cargarProductos();showScreen('inventario');
}
async function eliminarProducto(id){
  if(!confirm('¿Eliminar este producto?'))return;
  await sb.from('productos').delete().eq('id',id);
  showToast('Producto eliminado');
  await cargarProductos();
}

// ── NAVEGACIÓN ───────────────────────────────────────────
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  const idx=['inventario','venta','ventas','agregar'].indexOf(name);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if(name==='venta'){renderCatFilters();filtrarProductos();renderCarrito();}
  if(name==='ventas')cargarVentas();
  if(name==='inventario')cargarProductos();
}
function iniciarApp(){
  updateHora();setInterval(updateHora,30000);
  cargarProductos();
}
function updateHora(){
  document.getElementById('fecha-hora').textContent=new Date().toLocaleString('es-PE',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}
</script>
